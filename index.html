<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وين راك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        p {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        #locate-btn {
            display: block;
            margin: 0 auto 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        #locate-btn:hover {
            background-color: #0056b3;
        }
        #map {
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>وين راك</h1>
    <p>تطبيق لتحديد موقعك الحالي على الخريطة.</p>
    <button id="locate-btn">تحديد موقعي</button>
    <button id="stop-btn" style="display: none; margin-left: 10px; background-color: #dc3545;">إيقاف التتبع</button>
    <div id="coords" style="text-align: center; color: #666; font-size: 14px; margin-top: 10px;"></div>
    <div id="map" style="width: 100%; height: 400px; margin-top: 20px;"></div>
</body>
<script>
    // Initialize map
    const map = L.map('map').setView([0, 0], 2);
    let marker = null;
    let watchId = null;
    let locationHistory = [];
    let polyline = null;
    let isTracking = false;
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);
    
    const locateBtn = document.getElementById('locate-btn');
    const stopBtn = document.getElementById('stop-btn');
    const coordsDiv = document.getElementById('coords');
    
    // Start live location tracking
    locateBtn.addEventListener('click', function() {
        if (navigator.geolocation) {
            this.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            isTracking = true;
            locationHistory = [];
            
            // Watch position for live updates
            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    
                    // Add to location history
                    locationHistory.push([lat, lng]);
                    
                    // Remove old marker if exists
                    if (marker) {
                        map.removeLayer(marker);
                    }
                    
                    // Add new marker
                    marker = L.marker([lat, lng], {
                        title: 'موقعك الحالي'
                    }).addTo(map);
                    marker.bindPopup(`
                        <div style="text-align: center;">
                            <strong>موقعك الحالي</strong><br>
                            الخط: ${lat.toFixed(6)}<br>
                            الطول: ${lng.toFixed(6)}<br>
                            دقة: ${accuracy.toFixed(0)}م
                        </div>
                    `).openPopup();
                    
                    // Update coordinates display
                    coordsDiv.innerHTML = `
                        📍 الخط: ${lat.toFixed(6)} | الطول: ${lng.toFixed(6)} | دقة: ${accuracy.toFixed(0)}م
                    `;
                    
                    // Center map on current position
                    map.setView([lat, lng], 16);
                    
                    // Draw or update polyline
                    if (locationHistory.length > 1) {
                        if (polyline) {
                            map.removeLayer(polyline);
                        }
                        polyline = L.polyline(locationHistory, {
                            color: 'red',
                            weight: 3,
                            opacity: 0.7,
                            dashArray: '5, 5'
                        }).addTo(map);
                    }
                },
                function(error) {
                    alert('خطأ في تتبع الموقع: ' + error.message);
                    locateBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                    isTracking = false;
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                }
            );
        } else {
            alert('متصفحك لا يدعم تحديد الموقع');
        }
    });
    
    // Stop tracking
    stopBtn.addEventListener('click', function() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        locateBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        isTracking = false;
        coordsDiv.innerHTML = `المسار المسجل: ${locationHistory.length} نقطة`;
    });
</script>
</html>
